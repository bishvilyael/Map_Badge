<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>מפת יעל</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="map"></div>

  <div class="map-header">
    <div class="map-header-box">
      <img class="header-icon" src="icons/header-right.png" alt="">
      <span id="mapTitleText">טוען מפה...</span>
      <img class="header-icon" src="icons/header-right.png" alt="">
    </div>
  </div>

  <div class="mobile-tools">
    <button id="searchToggle" class="tool-btn" title="חיפוש">🔎</button>
    <button id="layersToggle" class="tool-btn" title="שכבות">☰</button>
    <button id="statusToggle" class="tool-btn" title="סטטוס">ℹ</button>
  </div>

  <div id="searchPanel" class="search-panel panel-box">
    <div id="searchHeader" class="panel-header search-header">
      <div class="search-title-main">
        <span class="panel-title">חיפוש במפה</span>
        <span class="search-mode-inline">
          <label><input type="radio" id="modePoints" name="searchMode" checked> חיפוש יעל</label>
          <label><input type="radio" id="modeArea" name="searchMode"> חיפוש אזור</label>
        </span>
      </div>
      <div class="search-header-buttons">
        <button id="searchMinimize" class="search-mini-btn" title="מזער">−</button>
        <button id="searchClose" class="panel-close-btn" title="סגור">×</button>
      </div>
    </div>
    <div class="search-input-row">
      <input id="searchInput" type="text" placeholder="חיפוש לפי שם, Badge, מזהה, תאריך...">
      <button id="searchActionBtn" class="search-action-btn">חפש</button>
    </div>
    <label id="exactSearchLabel" class="search-exact"><input id="exactSearch" type="checkbox"> חיפוש מדויק</label>
    <div id="searchResults" class="search-results"></div>
  </div>

  <div id="layersList" class="layers-list-panel panel-box open">
    <div class="panel-header">
      <span class="panel-title">שכבות</span>
      <button id="layersClose" class="panel-close-btn" title="סגור">×</button>
    </div>
    <div id="layersListBody"></div>
  </div>

  <div id="status" class="status-box panel-box">
    <div class="panel-header">
      <span class="panel-title">סטטוס</span>
      <button id="statusClose" class="panel-close-btn" title="סגור">×</button>
    </div>
    <div id="statusBody"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="config.js"></script>
  <script src="state.js"></script>
  <script src="dom.js"></script>
  <script src="helpers.js"></script>
  <script src="geojson.js"></script>
  <script src="search.js"></script>
  <script src="title.js"></script>
  <script src="ui.js"></script>
  <script src="main.js"></script>
</body>
</html>
