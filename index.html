<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<title>מפת יעל</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
html, body, #map {
  height: 100%;
  margin: 0;
  font-family: Arial;
}

#titleBox {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  background: white;
  padding: 8px 20px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
  font-size: 18px;
  font-weight: bold;
  text-align: center;
  display: flex;
  align-items: center;
  gap: 10px;
}

#titleBox img {
  height: 20px;
}

.leaflet-popup-content-wrapper {
  max-width: 620px;
}

.leaflet-popup-content {
  direction: rtl;
  text-align: right;
  font-family: Arial;
  width: 560px !important;
  max-width: 80vw;
  font-size: 14px;
}

.leaflet-popup-content img {
  max-width: 540px;
  width: 100%;
  height: auto;
  margin-top: 8px;
  display: block;
}

.other-icon {
  width: 14px;
  height: 14px;
  background: orange;
  border-radius: 50%;
  border: 2px solid white;
  box-shadow: 0 0 4px #333;
}
</style>
</head>

<body>

<div id="titleBox">
  <img src="icons/header-right.png">
  <span id="titleText">טוען...</span>
  <img src="icons/header-right.png">
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const badgeNo = params.get("badge");

if (!badgeNo) {
  document.getElementById("titleText").textContent = "חסר badge";
  throw new Error("Missing badge");
}

const DATA_FILE = `json/Badge_${badgeNo}/data.geojson`;
const TITLE_FILE = `json/Badge_${badgeNo}/title.txt`;
const MAIN_NAME = `#${badgeNo}`;

const map = L.map("map").setView([31.5,34.8],7);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution:"&copy; OpenStreetMap"
}).addTo(map);

const mainIcon = L.icon({
  iconUrl: "icons/marker.png",
  iconSize: [25, 41],
  iconAnchor: [12, 41],
  popupAnchor: [1, -34]
});

const otherIcon = L.divIcon({
  html: "<div class='other-icon'></div>",
  iconSize: [16,16],
  iconAnchor: [8,8]
});

const mainLayer = L.layerGroup();
const otherLayer = L.layerGroup();

function prop(f,names){
  for (let n of names){
    if (f.properties?.[n] !== undefined && f.properties?.[n] !== null) {
      return f.properties[n];
    }
  }
  return "";
}

function getName(f){
  return String(prop(f,["name","Name","NAME"])).trim();
}

function getDesc(f){
  return prop(f,["description","Description","DESCRIPTION"]);
}

function fixHtml(html){
  if (!html) return "";

  html = String(html);

  html = html.replace(
    /<a[^>]*href=["']([^"']*facebook[^"']*)["'][^>]*>.*?<\/a>/gi,
    `<a href="$1" target="_blank">פייסבוק</a>`
  );

  html = html.replaceAll("&amp;","&");

  return html;
}

fetch(TITLE_FILE)
.then(r=>r.text())
.then(t=>{
  document.title = t.trim();
  document.getElementById("titleText").textContent = t.trim();
});

fetch(DATA_FILE)
.then(r=>{
  if (!r.ok) throw new Error("אין data.geojson");
  return r.json();
})
.then(data=>{
  const all = [];

  data.features.forEach(f=>{
    const name = getName(f);
    const isMain = name === MAIN_NAME;

    const layer = L.geoJSON(f,{
      pointToLayer:(feature,latlng)=>{
        return isMain
          ? L.marker(latlng,{icon:mainIcon})
          : L.marker(latlng,{icon:otherIcon});
      },

      onEachFeature:(feature,layer)=>{
        let html = fixHtml(getDesc(feature));
        if (html){
          layer.bindPopup(html,{
            maxWidth: 620,
            minWidth: 560
          });
        }
      }
    });

    if (isMain){
      layer.addTo(mainLayer);
    } else {
      layer.addTo(otherLayer);
    }

    all.push(layer);
  });

  mainLayer.addTo(map);
  otherLayer.addTo(map);

  L.control.layers(null,{
    [`יעל #${badgeNo}`]: mainLayer,
    "נלווים": otherLayer
  }).addTo(map);

  if (all.length){
    const g = L.featureGroup(all);
    map.fitBounds(g.getBounds(),{
      padding:[30,30],
      maxZoom:14
    });
  }
})
.catch(err=>{
  console.error(err);
  document.getElementById("titleText").textContent =
    "שגיאה: " + err.message;
});
</script>
</body>
</html>
