<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <title>מפת יעל</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      font-family: Arial;
    }

    /* ===== כותרת ===== */
    #titleBox {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: white;
      padding: 8px 16px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    /* ===== Popup ===== */
    .leaflet-popup-content {
      direction: rtl;
      text-align: right;
      font-family: Arial;
    }

    .leaflet-popup-content img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div id="titleBox">טוען...</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const params = new URLSearchParams(window.location.search);
const badgeNo = params.get("badge");

if (!badgeNo) {
  throw new Error("לא הוגדר badge");
}

const DATA_FILE = `json/Badge_${badgeNo}/data.geojson`;
const TITLE_FILE = `json/Badge_${badgeNo}/title.txt`;
const MAIN_NAME = `#${badgeNo}`;

/* ===== מפה ===== */

const map = L.map("map").setView([31.5,34.8],7);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution:"&copy; OpenStreetMap"
}).addTo(map);

/* ===== שכבות ===== */

const mainLayer = L.layerGroup();
const otherLayer = L.layerGroup();

/* ===== פונקציות ===== */

function getName(f){
  return (f.properties?.name || "").trim();
}

function getDesc(f){
  return f.properties?.description || "";
}

/* === תיקון פייסבוק + תמונות === */
function fixHtml(html){

  // פייסבוק -> רק "פייסבוק"
  html = html.replace(
    /<a[^>]*href="([^"]*facebook[^"]*)"[^>]*>.*?<\/a>/gi,
    `<a href="$1" target="_blank">פייסבוק</a>`
  );

  // תיקון Google Drive
  html = html.replace(
    /https:\/\/drive\.google\.com\/uc\?export=view&amp;id=/g,
    "https://drive.google.com/uc?export=view&id="
  );

  return html;
}

/* ===== טעינת כותרת ===== */

fetch(TITLE_FILE)
.then(r => r.text())
.then(t => {
  document.title = t;
  document.getElementById("titleBox").textContent = t;
});

/* ===== טעינת נתונים ===== */

fetch(DATA_FILE)
.then(r => {
  if (!r.ok) throw new Error("אין data.geojson");
  return r.json();
})
.then(data => {

  const all = [];

  data.features.forEach(f => {

    const name = getName(f);
    const isMain = name === MAIN_NAME;

    const layer = L.geoJSON(f, {

      /* === אייקונים === */
      pointToLayer: function(feature, latlng){

        if (isMain){
          return L.marker(latlng); // יעל ראשי רגיל
        }

        return L.circleMarker(latlng,{
          radius:6,
          color:"#ff6600",
          fillColor:"#ff6600",
          fillOpacity:1
        });
      },

      onEachFeature: function(feature, layer){

        let html = getDesc(feature);

        if (html){
          html = fixHtml(html);
          layer.bindPopup(html, {maxWidth:500});
        }
      }

    });

    if (isMain){
      layer.addTo(mainLayer);
    } else {
      layer.addTo(otherLayer);
    }

    all.push(layer);
  });

  mainLayer.addTo(map);
  otherLayer.addTo(map);

  L.control.layers(null,{
    [`יעל #${badgeNo}`]: mainLayer,
    "נלווים": otherLayer
  }).addTo(map);

  if (all.length){
    const g = L.featureGroup(all);
    map.fitBounds(g.getBounds(),{padding:[30,30]});
  }

})
.catch(err=>{
  console.error(err);
  document.getElementById("titleBox").textContent =
    "שגיאה: " + err.message;
});

</script>
</body>
</html>
