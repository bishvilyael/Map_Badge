<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<title>מפת יעל</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
html, body, #map {
  height: 100%;
  margin: 0;
  font-family: Arial, sans-serif;
}

#titleBox {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  background: white;
  padding: 8px 18px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
  font-size: 18px;
  font-weight: bold;
  text-align: center;
  white-space: nowrap;
}

.leaflet-popup-content {
  direction: rtl;
  text-align: right;
  font-family: Arial, sans-serif;
}

.leaflet-popup-content img {
  max-width: 450px;
  width: 100%;
  height: auto;
  display: block;
  margin-top: 8px;
}

.other-badge-icon {
  background: orange;
  border: 2px solid white;
  border-radius: 50%;
  width: 14px;
  height: 14px;
  box-shadow: 0 0 4px #333;
}
</style>
</head>

<body>
<div id="titleBox">טוען מפה...</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const badgeNo = params.get("badge");

if (!badgeNo) {
  document.getElementById("titleBox").textContent = "חסר פרמטר badge";
  throw new Error("Missing badge parameter");
}

const DATA_FILE = `json/Badge_${badgeNo}/data.geojson`;
const TITLE_FILE = `json/Badge_${badgeNo}/title.txt`;
const MAIN_BADGE_NAME = `#${badgeNo}`;

const map = L.map("map", { preferCanvas: true }).setView([31.5, 34.8], 7);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "&copy; OpenStreetMap contributors"
}).addTo(map);

const mainLayer = L.layerGroup();
const otherLayer = L.layerGroup();

const otherIcon = L.divIcon({
  className: "",
  html: "<div class='other-badge-icon'></div>",
  iconSize: [18, 18],
  iconAnchor: [9, 9]
});

function prop(feature, names) {
  if (!feature || !feature.properties) return "";
  for (const n of names) {
    if (feature.properties[n] !== undefined && feature.properties[n] !== null) {
      return String(feature.properties[n]);
    }
  }
  return "";
}

function getName(feature) {
  return prop(feature, ["name", "Name", "NAME"]).trim();
}

function getDescription(feature) {
  return prop(feature, [
    "description",
    "Description",
    "DESCRIPTION",
    "desc",
    "Desc"
  ]);
}

function fixPopupHtml(html) {
  if (!html) return "";

  html = String(html);

  html = html.replace(
    /<a\s+([^>]*href=['"][^'"]*facebook\.com[^'"]*['"][^>]*)>.*?<\/a>/gis,
    "<a $1 target='_blank'>פייסבוק</a>"
  );

  html = html.replaceAll("&amp;", "&");

  html = html.replace(
    /https:\/\/drive\.google\.com\/uc\?export=view&id=([^'" >]+)/g,
    "https://drive.google.com/thumbnail?id=$1&sz=w800"
  );

  return html;
}

async function loadTitle() {
  try {
    const r = await fetch(TITLE_FILE, { cache: "no-store" });
    if (!r.ok) throw new Error();
    const title = (await r.text()).trim();
    document.title = title;
    document.getElementById("titleBox").textContent = `🦌 ${title} 🦌`;
  } catch {
    const title = `מפה אישית עבור יעל # ${badgeNo}`;
    document.title = title;
    document.getElementById("titleBox").textContent = `🦌 ${title} 🦌`;
  }
}

async function loadData() {
  const r = await fetch(DATA_FILE, { cache: "no-store" });
  if (!r.ok) throw new Error("לא נמצא data.geojson");

  const data = await r.json();
  const allLayers = [];

  data.features.forEach(feature => {
    const name = getName(feature);
    const isMain = name === MAIN_BADGE_NAME;

    const layer = L.geoJSON(feature, {
      pointToLayer: function(feature, latlng) {
        if (isMain) {
          return L.marker(latlng);
        }
        return L.marker(latlng, { icon: otherIcon });
      },

      onEachFeature: function(feature, layer) {
        const desc = fixPopupHtml(getDescription(feature));
        if (desc) {
          layer.bindPopup(desc, { maxWidth: 520 });
        } else {
          layer.bindPopup(getName(feature));
        }
      }
    });

    if (isMain) {
      layer.addTo(mainLayer);
    } else {
      layer.addTo(otherLayer);
    }

    allLayers.push(layer);
  });

  mainLayer.addTo(map);
  otherLayer.addTo(map);

  L.control.layers(null, {
    [`יעל #${badgeNo}`]: mainLayer,
    "נלווים / יעלים אחרים": otherLayer
  }, {
    collapsed: false
  }).addTo(map);

  if (allLayers.length) {
    const group = L.featureGroup(allLayers);
    map.fitBounds(group.getBounds(), {
      padding: [30, 30],
      maxZoom: 14
    });
  }
}

loadTitle()
  .then(loadData)
  .catch(err => {
    console.error(err);
    document.getElementById("titleBox").textContent = "שגיאה: " + err.message;
  });
</script>
</body>
</html>
