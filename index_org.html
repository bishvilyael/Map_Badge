<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<title>מפת יעל</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  html, body { height:100%; margin:0; font-family:Arial, sans-serif; }
  #map { position:absolute; inset:0; width:100%; height:100%; }

  .map-header {
    position:absolute; top:10px; left:50%; transform:translateX(-50%);
    z-index:1000; pointer-events:none;
  }
  .map-header-box {
    display:inline-flex; align-items:center; gap:10px;
    background:rgba(255,255,255,.95); padding:8px 18px;
    border:1px solid #ccc; border-radius:12px;
    box-shadow:0 1px 6px rgba(0,0,0,.15);
    font-size:22px; font-weight:bold; line-height:1.3; white-space:nowrap;
  }
  .map-header-box img,
  .header-icon {
    width:28px !important; height:28px !important;
    max-width:28px !important; max-height:28px !important;
    object-fit:contain !important; flex:0 0 auto;
  }

  .layers-panel {
    position:absolute; top:70px; left:10px; z-index:1000;
    width:260px; max-width:calc(100vw - 20px);
    background:rgba(255,255,255,.98); border:1px solid #ccc;
    border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.15);
    padding:10px; direction:rtl;
  }
  .layers-title { font-weight:bold; font-size:15px; margin-bottom:8px; }
  .layer-line { display:flex; align-items:center; gap:8px; padding:5px 0; font-size:14px; }

  .status-box {
    position:absolute; bottom:10px; left:10px; z-index:1000;
    background:rgba(255,255,255,.95); border:1px solid #ccc;
    border-radius:10px; padding:6px 10px; font-size:13px; white-space:pre-line;
    max-width:300px;
  }

  .custom-marker { display:flex; align-items:center; gap:2px; white-space:nowrap; transform:translate(-4px,-18px); direction:ltr; }
  .custom-marker img { width:14px !important; height:20px !important; object-fit:contain; display:block; flex:0 0 auto; }
  .custom-marker-label {
    font-size:13px; font-weight:bold; color:#083c68;
    text-shadow:-1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
    direction:ltr; line-height:1;
  }
  .other-badge-marker .custom-marker-label { color:#b45a00; }
  .other-badge-marker img { filter:hue-rotate(25deg) saturate(1.2); }

  .leaflet-popup-content-wrapper { border-radius:10px; }
  .leaflet-popup-content {
    margin:12px 14px; min-width:240px; max-width:340px;
    direction:rtl; text-align:right; line-height:1.4; font-size:14px; font-family:Arial, sans-serif;
  }
  .popup-title { font-weight:bold; font-size:16px; margin-bottom:8px; text-align:right; }
  .popup-body img {
    display:block; max-width:100%; max-height:260px; width:auto; height:auto;
    object-fit:contain; margin:8px auto; border:1px solid #ccc; border-radius:4px; background:#fff;
  }
  .popup-body a { word-break:break-word; overflow-wrap:anywhere; }
  .popup-image-error { color:#b00020; font-size:12px; margin-top:6px; text-align:center; }

  @media (max-width:768px) {
    .map-header-box { font-size:14px; padding:5px 8px; gap:4px; }
    .map-header-box img, .header-icon { width:18px !important; height:18px !important; }
    .layers-panel { top:58px; width:min(250px, calc(100vw - 20px)); max-height:34vh; overflow:auto; }
    .leaflet-popup-content { min-width:200px; max-width:260px; font-size:13px; }
  }
</style>
</head>
<body>
<div id="map"></div>

<div class="map-header">
  <div class="map-header-box">
    <img class="header-icon" src="icons/header-right.png" alt="">
    <span id="mapTitleText">טוען מפה...</span>
    <img class="header-icon" src="icons/header-right.png" alt="">
  </div>
</div>

<div class="layers-panel" id="layersPanel">
  <div class="layers-title">שכבות</div>
  <label class="layer-line"><input type="checkbox" id="mainLayerCheck" checked> <span id="mainLayerLabel">יעל ראשי</span></label>
  <label class="layer-line"><input type="checkbox" id="otherLayerCheck" checked> <span>נלווים</span></label>
</div>

<div class="status-box" id="statusBox">טוען...</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const badgeNo = (params.get('badge') || '').trim();
const titleEl = document.getElementById('mapTitleText');
const statusEl = document.getElementById('statusBox');
const mainLayerLabel = document.getElementById('mainLayerLabel');

function setStatus(t){ statusEl.textContent = t; }
function escapeHtml(text){ const d=document.createElement('div'); d.textContent=text||''; return d.innerHTML; }
function getProp(props, names){
  if(!props) return '';
  for(const n of names){ if(props[n] !== undefined && props[n] !== null) return props[n]; }
  const lower={}; Object.keys(props).forEach(k=>lower[k.toLowerCase()]=k);
  for(const n of names){ const a=lower[String(n).toLowerCase()]; if(a && props[a] !== null && props[a] !== undefined) return props[a]; }
  return '';
}
function getName(feature){ return String(getProp(feature.properties, ['name','Name','NAME','title','Title']) || 'ללא שם').trim(); }
function getDescription(feature){ return String(getProp(feature.properties, ['description','Description','DESCRIPTION','desc','Desc']) || ''); }
function getLatLng(feature){
  const g=feature && feature.geometry;
  if(!g || g.type !== 'Point' || !Array.isArray(g.coordinates) || g.coordinates.length < 2) return null;
  const lon=parseFloat(g.coordinates[0]), lat=parseFloat(g.coordinates[1]);
  if(Number.isNaN(lat) || Number.isNaN(lon)) return null;
  return L.latLng(lat, lon);
}
function extractDriveFileId(url){
  if(!url) return null;
  let m=url.match(/drive\.google\.com\/file\/d\/([A-Za-z0-9_-]+)/i); if(m) return m[1];
  m=url.match(/drive\.google\.com\/uc\?[^"' ]*id=([A-Za-z0-9_-]+)/i); if(m) return m[1];
  m=url.match(/drive\.google\.com\/thumbnail\?[^"' ]*id=([A-Za-z0-9_-]+)/i); if(m) return m[1];
  m=url.match(/lh3\.googleusercontent\.com\/d\/([A-Za-z0-9_-]+)/i); if(m) return m[1];
  return null;
}
function convertDriveUrl(url){ const id=extractDriveFileId(url); return id ? `https://lh3.googleusercontent.com/d/${id}=w1000` : url; }
function normalizeDescriptionHtml(html){
  const temp=document.createElement('div');
  temp.innerHTML=html || '';
  temp.querySelectorAll('img').forEach(img=>{
    img.setAttribute('src', convertDriveUrl(img.getAttribute('src') || ''));
    img.removeAttribute('loading');
    img.onerror=function(){
      const err=document.createElement('div'); err.className='popup-image-error'; err.textContent='התמונה לא נטענה';
      this.insertAdjacentElement('afterend', err); this.style.display='none';
    };
  });
  temp.querySelectorAll('a').forEach(a=>{
    const href=a.getAttribute('href') || '';
    a.setAttribute('target','_blank'); a.setAttribute('rel','noopener noreferrer');
    if(/facebook\.com/i.test(href)) a.textContent='פייסבוק';
  });
  return temp.innerHTML;
}
function createMarkerIcon(labelText, extraClass){
  return L.divIcon({
    className:'',
    html:`<div class="custom-marker ${extraClass || ''}"><img src="icons/marker.png" alt=""><div class="custom-marker-label">${escapeHtml(labelText || '')}</div></div>`,
    iconSize:[70,21], iconAnchor:[9,20], popupAnchor:[0,-18]
  });
}

if(!badgeNo){
  titleEl.textContent = 'חסר badge בכתובת';
  setStatus('פתח כך: ?badge=1497');
  throw new Error('Missing badge parameter');
}

const DATA_FILE = `json/Badge_${badgeNo}/data.geojson`;
const TITLE_JSON = `json/Badge_${badgeNo}/map-title.json`;
const TITLE_TXT = `json/Badge_${badgeNo}/title.txt`;
const MAIN_NAME = `#${badgeNo}`;
mainLayerLabel.textContent = `יעל #${badgeNo}`;

const map = L.map('map', { preferCanvas:true }).setView([31.5,34.8],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'&copy; OpenStreetMap contributors' }).addTo(map);

const mainLayer = L.layerGroup().addTo(map);
const otherLayer = L.layerGroup().addTo(map);
const allBounds = [];

async function loadTitle(){
  let title = `מפה אישית עבור יעל # ${badgeNo}`;
  try{
    const r = await fetch(TITLE_JSON, {cache:'no-store'});
    if(r.ok){ const j = await r.json(); if(j.title) title = j.title; }
    else {
      const t = await fetch(TITLE_TXT, {cache:'no-store'});
      if(t.ok) title = (await t.text()).trim() || title;
    }
  } catch(e) {}
  titleEl.textContent = title;
  document.title = title;
}

async function loadData(){
  const r = await fetch(DATA_FILE, {cache:'no-store'});
  if(!r.ok) throw new Error(`לא נמצא ${DATA_FILE}`);
  const data = await r.json();
  if(!data || !Array.isArray(data.features)) throw new Error('GeoJSON לא תקין');

  let mainCount=0, otherCount=0;
  data.features.forEach(feature=>{
    const latlng=getLatLng(feature); if(!latlng) return;
    const name=getName(feature);
    const isMain = name === MAIN_NAME;
    const desc = normalizeDescriptionHtml(getDescription(feature));
    const marker = L.marker(latlng, { icon:createMarkerIcon(name, isMain ? '' : 'other-badge-marker') });
    marker.bindPopup(`<div class="popup-wrap"><div class="popup-title">${escapeHtml(name)}</div><div class="popup-body">${desc}</div></div>`, { maxWidth:340, minWidth:220 });
    if(isMain){ marker.addTo(mainLayer); mainCount++; } else { marker.addTo(otherLayer); otherCount++; }
    allBounds.push([latlng.lat, latlng.lng]);
  });
  if(allBounds.length) map.fitBounds(allBounds, {padding:[20,20], maxZoom:14});
  setStatus(`נטענו ${mainCount + otherCount} נקודות\nיעל ראשי: ${mainCount}\nנלווים: ${otherCount}`);
}

document.getElementById('mainLayerCheck').addEventListener('change', e=> e.target.checked ? map.addLayer(mainLayer) : map.removeLayer(mainLayer));
document.getElementById('otherLayerCheck').addEventListener('change', e=> e.target.checked ? map.addLayer(otherLayer) : map.removeLayer(otherLayer));

loadTitle().then(loadData).catch(err=>{ console.error(err); setStatus('שגיאה: ' + err.message); titleEl.textContent='שגיאה בטעינת מפה'; });
</script>
</body>
</html>
